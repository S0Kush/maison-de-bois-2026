<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAISON DE BOIS - 2008-2018 EXPERIENCE</title>
    <style>
        @font-face {
            font-family: 'Retro';
            src: local('Impact'), local('Arial Black');
        }

        :root {
            --pink: #ff00ff;
            --green: #00ff00;
            --purple: #8a2be2;
            --cyan: #00ffff;
            --yellow: #ffff00;
        }

        body {
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(45deg, #000, #1a0033, #001a1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 50;
        }

        .shape {
            position: absolute; z-index: -1; opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }
        .shape-glitch { animation: float 15s infinite alternate-reverse, glitchPulse 3s infinite; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(150px, -100px) rotate(360deg) scale(1.2); }
        }
        @keyframes glitchPulse {
            0%, 100% { filter: drop-shadow(0 0 5px var(--cyan)); }
            50% { filter: drop-shadow(0 0 15px var(--pink)); }
        }

        #main-container {
            text-align: center; border: 2px solid var(--cyan); padding: 25px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 0 40px rgba(255, 0, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
            max-width: 600px; width: 90%; position: relative; z-index: 10;
        }

        h1 {
            font-family: 'Retro', sans-serif; font-size: 2.2rem; margin-top: 0; margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 0%, var(--pink) 50%, var(--purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px var(--cyan)); font-style: italic;
        }

        .status-screen {
            background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
            border: 3px solid var(--pink); border-radius: 10px; 
            height: 160px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 20px 0; position: relative; box-shadow: inset 0 0 20px #000;
            overflow: hidden;
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .lcd-text { color: var(--cyan); font-weight: bold; font-size: 0.9rem; text-shadow: 0 0 5px var(--cyan); margin-bottom: 15px; }

        .progress-bar-curved {
            width: 80%; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 50px; overflow: hidden; border: 1px solid var(--cyan);
            box-shadow: 0 0 10px rgba(0,255,255,0.2); display: none;
        }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); transition: width 0.2s; }

        #game-area { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: rgba(0, 255, 255, 0.05); }
        
        #background-layer { 
            position: absolute; top: 0; left: 0; height: 100%; width: 600%; 
            display: flex; will-change: transform; pointer-events: none; z-index: 1;
        }
        .bg-slice { width: 16.66%; height: 100%; background-size: cover; background-position: center bottom; }

        .img-1 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD1.png?raw=true'); }
        .img-2 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD2.png?raw=true'); }
        .img-3 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD3.png?raw=true'); }
        .img-4 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD4.png?raw=true'); }

        #player {
    position: absolute; 
    bottom: 0; 
    left: 30px; 
    width: 65px;  /* Garde une largeur fixe */
    height: 85px; /* Garde une hauteur fixe */
    z-index: 20; 
    transition: left 1s ease-in-out;
    background-size: contain;      /* L'image s'adapte sans déborder */
    background-repeat: no-repeat;
    background-position: bottom center; /* Très important pour que les pieds ne bougent pas */
}
        
        .platform { 
            position: absolute; bottom: 0; 
            background: rgba(0, 255, 255, 0.2); 
            border-top: 3px solid var(--cyan); border-left: 1px solid rgba(0,255,255,0.5);
            box-shadow: 0 0 15px rgba(0,255,255,0.3); z-index: 15;
        }

        .ground-line {
            position: absolute; bottom: 0; width: 100%; height: 2px;
            background: var(--pink); box-shadow: 0 0 10px var(--pink); z-index: 10;
        }

        .action-btn {
            background: linear-gradient(to bottom, var(--cyan), var(--purple));
            color: white; border: 2px solid #fff; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
            font-family: 'Retro', sans-serif; animation: pulseBtn 2s infinite;
        }
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #links-container { display: none; flex-direction: column; gap: 15px; width: 100%; margin-top: 10px; }
        .link-btn {
            text-decoration: none; padding: 15px; background: var(--green); color: black;
            font-weight: 900; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.2s; font-family: 'Retro', sans-serif; font-size: 1.1rem; text-transform: uppercase;
        }
        .link-btn:hover { transform: skew(-5deg) scale(1.02); background: var(--yellow); box-shadow: 5px 5px 0px var(--pink); }

        .meme-gif { width: 60px; margin-top: 10px; border-radius: 5px; border: 2px solid white; display: none; z-index: 40; }
        .hint-text { font-size: 0.7rem; color: var(--yellow); margin-top: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="scanlines"></div>

<svg class="shape" style="top:5%; left:5%; width:150px;" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" stroke="var(--cyan)" stroke-width="3" fill="none" stroke-dasharray="10 5"/></svg>
<svg class="shape shape-glitch" style="bottom:10%; right:5%; width:180px;" viewBox="0 0 200 200"><rect x="50" y="50" width="100" height="100" stroke="var(--green)" stroke-width="2" fill="none" transform="rotate(45 100 100)" /></svg>

<div id="main-container">
    <h1>MAISON DE BOIS</h1>
    <div style="font-weight: bold; color: var(--yellow); font-size: 0.75rem; letter-spacing: 2px;">BIEN PUBLIC • BORDEAUX • 07.05</div>
    
    <div class="status-screen" id="screen" onclick="jump()" ontouchstart="jump()">
        <div id="lcd-text" class="lcd-text">[ SYSTEM STATUS: IDLE ]</div>
        <div id="loading-bar" class="progress-bar-curved"><div id="loading-fill" class="progress-fill"></div></div>
        
        <div id="game-ui" style="display:none; width: 100%; position: absolute; top: 10px; text-align: center; z-index: 30;">
            <div style="font-size: 0.6rem; color: var(--cyan); margin-bottom: 5px;">SWAG LEVEL</div>
            <div class="progress-bar-curved" style="display: inline-block; width: 70%; height: 10px; border-radius: 50px;"><div id="game-fill" class="progress-fill"></div></div>
        </div>

        <div id="game-area">
            <div id="background-layer">
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-3"></div>
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-4"></div>
            </div>
            <div class="ground-line"></div>
            <div id="player"></div>
        </div>
        <img id="meme" class="meme-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueXFpZ3R4bmZueXFpZ3R4bmZueXFpZ3R4bmZueXFpJnB0PWFjdGl2ZV9mZWVk/sIIhZmxU2XfTq/giphy.gif">
    </div>

    <div id="hint" class="hint-text">TAP TO CLIMB THE VIBE!</div>
    <button id="main-btn" class="action-btn" onclick="startSequence()">BOOT SYSTEM</button>

    <div id="links-container">
        <a href="https://dice.fm/event/k6d99l-les-nuits-maison-de-bois-7th-may-bien-public-bordeaux-tickets" class="link-btn" target="_blank">🎟️ BILLETTERIE DICE</a>
        <a href="https://www.instagram.com/p/DXuQVvaDCUo/" class="link-btn" style="background: var(--pink); color: white;" target="_blank">📸 INSTAGRAM POST</a>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const btn = document.getElementById('main-btn');
    const lcdText = document.getElementById('lcd-text');
    const loadBar = document.getElementById('loading-bar');
    const loadFill = document.getElementById('loading-fill');
    const gameArea = document.getElementById('game-area');
    const bgLayer = document.getElementById('background-layer');
    const gameUI = document.getElementById('game-ui');
    const gameFill = document.getElementById('game-fill');
    const player = document.getElementById('player');
    const hint = document.getElementById('hint');
    const links = document.getElementById('links-container');
    const meme = document.getElementById('meme');

    // Chemins vers tes nouveaux Sprites
    // Chemins corrigés avec url('') pour l'affichage CSS
    const spriteWalk = "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Marche%201(4).png?raw=true')";
    
    const spriteJump = [
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Saut%201%20(2).png?raw=true')", 
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Saut%202%20(2).png?raw=true')"
    ];
    
    const spriteDance = [
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Dance%201%20(3).png?raw=true')", 
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Danse%202(3).png?raw=true')", 
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Danse%203%20(3).png?raw=true')"
    ];
    
    const spriteAction = [
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Action%201%20(4).png?raw=true')",
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Action%202%20(4).png?raw=true')",
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Action%203%20(4).png?raw=true')",
        "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Action%204(4).png?raw=true')"
    ];
    let gameActive = false, swagScore = 0, gameInterval, platformSpawner, animFrame = 0, isDancing = false;
    let playerY = 0, vy = 0, gravity = 0.5, isJumping = false, platforms = [], stairLevel = 0;

    function startSequence() {
        btn.style.display = 'none';
        loadBar.style.display = 'block';
        let width = 0;
        const loadInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadInterval);
                lcdText.style.display = 'none'; loadBar.style.display = 'none';
                screen.style.height = '320px';
                setTimeout(startGame, 600);
            } else {
                width += 5; loadFill.style.width = width + '%';
                lcdText.innerHTML = "LOADING SWAG...";
            }
        }, 100);
    }

    function startGame() {
        gameArea.style.display = 'block'; gameUI.style.display = 'block'; hint.style.display = 'block';
        gameActive = true; gameInterval = setInterval(gameLoop, 16); spawnPlatform();
    }

    function jump() { 
        if (!gameActive || isJumping || isDancing) return; 
        isJumping = true; 
        vy = 9; // Saut un peu moins haut pour être plus long
    }

    function spawnPlatform() {
        if (!gameActive || isDancing) return;
        stairLevel = (stairLevel + 1) % 4;
        let h = stairLevel * 35;
        if (h > 0) {
            let p = document.createElement('div');
            p.className = 'platform'; p.style.height = h + 'px'; p.style.width = '100px'; p.style.left = '100%';
            gameArea.appendChild(p);
            platforms.push({el: p, x: screen.offsetWidth, w: 100, h: h});
        }
        platformSpawner = setTimeout(spawnPlatform, 1100);
    }

    function gameLoop() {
        if (!gameActive) return;
        let groundH = 0;
        for (let i = platforms.length - 1; i >= 0; i--) {
            let p = platforms[i];
            p.x -= 2.5;
            p.el.style.left = p.x + 'px';
            if (p.x < 70 && p.x + p.w > 30) groundH = Math.max(groundH, p.h);
            if (p.x < -100) { p.el.remove(); platforms.splice(i, 1); }
        }
        
        vy -= gravity; playerY += vy;
        if (playerY <= groundH) { playerY = groundH; vy = 0; isJumping = false; }
        player.style.bottom = playerY + 'px';
        animFrame++;

        if (!isDancing) {
            swagScore += 0.08;
            gameFill.style.width = swagScore + '%';
            bgLayer.style.transform = `translateX(-${swagScore * 0.833}%)`;
            if (swagScore >= 100) startDance();
            
            // Animation pendant le jeu
            // Remplace la partie animation dans le gameLoop par ceci :
if (isJumping) {
    player.style.backgroundImage = spriteJump[0];
} else {
    // On alterne entre marche et action pour simuler le mouvement
    // Si spriteAction[0] n'est pas prêt, on reste sur spriteWalk
    let currentSprite = (Math.floor(animFrame/12)%2 == 0) ? spriteWalk : (spriteAction[0] || spriteWalk);
    player.style.backgroundImage = currentSprite;
}
        } else {
            // Animation de danse finale
            player.style.backgroundImage = spriteDance[Math.floor(animFrame/10)%3];
        }
    }

    function startDance() {
        isDancing = true; platforms.forEach(p => p.el.remove()); platforms = [];
        player.style.left = "calc(50% - 32px)"; playerY = 0;
        setTimeout(endSequence, 4000);
    }

    function endSequence() {
        gameActive = false; clearInterval(gameInterval); clearTimeout(platformSpawner);
        gameArea.style.display = 'none'; gameUI.style.display = 'none'; hint.style.display = 'none';
        screen.style.height = '160px';
        setTimeout(() => {
            lcdText.style.display = 'block'; lcdText.innerHTML = "PARTY LOADED!";
            meme.style.display = 'block'; links.style.display = 'flex';
        }, 600);
    }
</script>
</body>
</html>
