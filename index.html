<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAISON DE BOIS - 2008-2018 EXPERIENCE</title>
    <style>
        @font-face {
            font-family: 'Retro';
            src: local('Impact'), local('Arial Black');
        }

        :root {
            --pink: #ff00ff;
            --green: #00ff00;
            --purple: #8a2be2;
            --cyan: #00ffff;
            --yellow: #ffff00;
        }

        body {
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(45deg, #000, #1a0033, #001a1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 50;
        }

        #main-container {
            text-align: center; border: 2px solid var(--cyan); padding: 25px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 0 40px rgba(255, 0, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
            max-width: 600px; width: 90%; position: relative; z-index: 10;
        }

        h1 {
            font-family: 'Retro', sans-serif; font-size: 2.2rem; margin-top: 0; margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 0%, var(--pink) 50%, var(--purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px var(--cyan)); font-style: italic;
        }

        .status-screen {
            background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
            border: 3px solid var(--pink); border-radius: 10px; 
            height: 160px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 20px 0; position: relative; box-shadow: inset 0 0 20px #000;
            overflow: hidden;
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .lcd-text { color: var(--cyan); font-weight: bold; font-size: 0.9rem; text-shadow: 0 0 5px var(--cyan); margin-bottom: 15px; }

        .progress-bar-curved {
            width: 80%; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 50px; overflow: hidden; border: 1px solid var(--cyan);
            box-shadow: 0 0 10px rgba(0,255,255,0.2); display: none;
        }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); transition: width 0.2s; }

        #game-area { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: rgba(0, 255, 255, 0.05); }
        
        #background-layer { 
            position: absolute; top: 0; left: 0; height: 100%; width: 600%; 
            display: flex; will-change: transform; pointer-events: none; z-index: 1;
        }
        .bg-slice { width: 16.66%; height: 100%; background-size: cover; background-position: center bottom; }

        .img-1 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD1.png?raw=true'); }
        .img-2 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD2.png?raw=true'); }
        .img-3 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD3.png?raw=true'); }
        .img-4 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD4.png?raw=true'); }

        #player {
            position: absolute; bottom: 0; left: 30px; 
            width: 80px; height: 110px; /* Taille augmentée pour KEMCY */
            z-index: 20; background-size: contain; background-repeat: no-repeat;
            background-position: center bottom; image-rendering: pixelated; 
        }
        
        .swag-item {
            position: absolute; width: 40px; height: 40px;
            background-size: contain; background-repeat: no-repeat;
            z-index: 18; pointer-events: none;
        }

        .ground-line {
            position: absolute; bottom: 0; width: 100%; height: 2px;
            background: var(--pink); box-shadow: 0 0 10px var(--pink); z-index: 10;
        }

        .action-btn {
            background: linear-gradient(to bottom, var(--cyan), var(--purple));
            color: white; border: 2px solid #fff; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
            font-family: 'Retro', sans-serif; animation: pulseBtn 2s infinite;
        }

        #links-container { display: none; flex-direction: column; gap: 15px; width: 100%; margin-top: 10px; }
        .link-btn {
            text-decoration: none; padding: 15px; background: var(--green); color: black;
            font-weight: 900; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.2s; font-family: 'Retro', sans-serif; font-size: 1.1rem; text-transform: uppercase;
        }
        .meme-gif { width: 60px; margin-top: 10px; border-radius: 5px; border: 2px solid white; display: none; z-index: 40; }
    </style>
</head>
<body>

<div class="scanlines"></div>

<div id="main-container">
    <h1>MAISON DE BOIS</h1>
    <div style="font-weight: bold; color: var(--yellow); font-size: 0.75rem; letter-spacing: 2px;">BIEN PUBLIC • BORDEAUX • 07.05</div>
    
    <div class="status-screen" id="screen" onclick="jump()" ontouchstart="jump()">
        <div id="lcd-text" class="lcd-text">[ SYSTEM STATUS: IDLE ]</div>
        <div id="loading-bar" class="progress-bar-curved"><div id="loading-fill" class="progress-fill"></div></div>
        
        <div id="game-ui" style="display:none; width: 100%; position: absolute; top: 10px; text-align: center; z-index: 30;">
            <div style="font-size: 0.6rem; color: var(--cyan); margin-bottom: 5px;">SWAG LEVEL</div>
            <div class="progress-bar-curved" style="display: inline-block; width: 70%; height: 10px; border-radius: 50px;"><div id="game-fill" class="progress-fill"></div></div>
        </div>

        <div id="game-area">
            <div id="background-layer">
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-3"></div>
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-4"></div>
            </div>
            <div class="ground-line"></div>
            <div id="player"></div>
        </div>
        <img id="meme" class="meme-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueXFpZ3R4bmZueXFpZ3R4bmZueXFpZ3R4bmZueXFpJnB0PWFjdGl2ZV9mZWVk/sIIhZmxU2XfTq/giphy.gif">
    </div>

    <button id="main-btn" class="action-btn" onclick="startSequence()">BOOT SYSTEM</button>

    <div id="links-container">
        <a href="https://dice.fm/event/k6d99l-les-nuits-maison-de-bois-7th-may-bien-public-bordeaux-tickets" class="link-btn" target="_blank">🎟️ BILLETTERIE DICE</a>
    </div>
</div>

<script>
    const screen = document.getElementById('screen');
    const btn = document.getElementById('main-btn');
    const lcdText = document.getElementById('lcd-text');
    const loadBar = document.getElementById('loading-bar');
    const loadFill = document.getElementById('loading-fill');
    const gameArea = document.getElementById('game-area');
    const bgLayer = document.getElementById('background-layer');
    const gameUI = document.getElementById('game-ui');
    const gameFill = document.getElementById('game-fill');
    const player = document.getElementById('player');
    const links = document.getElementById('links-container');
    const meme = document.getElementById('meme');

    // NOUVEAUX SPRITES KEMCY (Marche à 4 frames)
    const spriteWalk = [
        "url('https://replicate.delivery/xpb3/hHeg9R8B6P02FC06vMOf5oO0C8C7VfGof5PebY668m9qf5XSA/out-0.webp')",
        "url('https://replicate.delivery/xpb3/MvI1f5W9C0veV69fQ7R06Peb86Q8C7fGof5PebY668m9qf5XSA/out-1.webp')",
        "url('https://replicate.delivery/xpb3/pPeb86Q8C7fGof5PebY668m9qf5XSA/out-2.webp')",
        "url('https://replicate.delivery/xpb3/V69fQ7R06Peb86Q8C7fGof5PebY668m9qf5XSA/out-3.webp')"
    ];
    
    const spriteJump = "url('https://replicate.delivery/xpb3/hHeg9R8B6P02FC06vMOf5oO0C8C7VfGof5PebY668m9qf5XSA/out-0.webp')";
    const spriteDance = spriteWalk; // Utilisation de la marche pour la danse en boucle

    // CONFIGURATION DES OBJETS (Assignation spécifique)
    const swagObjectsConfig = [
        { id: 'obj1', x: 800, y: 40, img: "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJueGZueXFpZ3R4bmZueXFpZ3R4bmZueXFpZ3R4bmZueXFpJnB0PWFjdGl2ZV9mZWVk/sIIhZmxU2XfTq/giphy.gif')" },
        { id: 'obj2', x: 2000, y: 120, img: "url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHJueGZueXFpZ3R4bmZueXFpZ3R4bmZueXFpZ3R4bmZueXFpJnB0PWFjdGl2ZV9mZWVk/sIIhZmxU2XfTq/giphy.gif')" }
    ];

    let gameActive = false, swagScore = 0, gameInterval, animFrame = 0, isDancing = false;
    let playerY = 0, vy = 0, gravity = 0.5, isJumping = false;
    let activeItems = [], collectedIds = new Set();

    function startSequence() {
        btn.style.display = 'none';
        loadBar.style.display = 'block';
        let width = 0;
        const loadInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadInterval);
                lcdText.style.display = 'none'; loadBar.style.display = 'none';
                screen.style.height = '320px';
                setTimeout(startGame, 600);
            } else {
                width += 5; loadFill.style.width = width + '%';
                lcdText.innerHTML = "LOADING SWAG...";
            }
        }, 100);
    }

    function startGame() {
        gameArea.style.display = 'block'; gameUI.style.display = 'block';
        gameActive = true; 
        gameInterval = setInterval(gameLoop, 16);
    }

    function jump() { 
        if (!gameActive || isJumping || isDancing) return; 
        isJumping = true; 
        vy = 9; 
    }

    function manageItems() {
        const bgOffset = swagScore * 30;
        swagObjectsConfig.forEach(obj => {
            const currentX = obj.x - bgOffset;
            if (currentX < screen.offsetWidth + 50 && currentX > -50 && !collectedIds.has(obj.id)) {
                let item = activeItems.find(i => i.id === obj.id);
                if (!item) {
                    const el = document.createElement('div');
                    el.className = 'swag-item';
                    el.style.backgroundImage = obj.img;
                    gameArea.appendChild(el);
                    item = { el, id: obj.id, x: obj.x, y: obj.y };
                    activeItems.push(item);
                }
                item.el.style.left = currentX + 'px';
                item.el.style.bottom = obj.y + 'px';
                if (currentX < 80 && currentX > 10 && Math.abs(playerY - obj.y) < 60) {
                    collectedIds.add(obj.id);
                    item.el.remove();
                }
            }
        });
    }

    function gameLoop() {
        if (!gameActive) return;
        vy -= gravity; playerY += vy;
        if (playerY <= 0) { playerY = 0; vy = 0; isJumping = false; }
        player.style.bottom = playerY + 'px';
        animFrame++;

        if (!isDancing) {
            swagScore += 0.08;
            gameFill.style.width = swagScore + '%';
            bgLayer.style.transform = `translateX(-${swagScore * 0.833}%)`;
            
            manageItems();

            if (swagScore >= 100) startDance();
            
            // ANIMATION DE MARCHE KEMCY
            if (isJumping) {
                player.style.backgroundImage = spriteJump;
            } else {
                // Change de frame toutes les 10 frames de jeu pour une marche fluide
                let frameIndex = Math.floor(animFrame / 10) % 4;
                player.style.backgroundImage = spriteWalk[frameIndex];
            }
        } else {
            let frameIndex = Math.floor(animFrame / 8) % 4;
            player.style.backgroundImage = spriteDance[frameIndex];
        }
    }

    function startDance() {
        isDancing = true; 
        activeItems.forEach(i => i.el.remove());
        player.style.left = "calc(50% - 40px)"; playerY = 0;
        setTimeout(endSequence, 4000);
    }

    function endSequence() {
        gameActive = false; clearInterval(gameInterval);
        gameArea.style.display = 'none'; gameUI.style.display = 'none';
        screen.style.height = '160px';
        setTimeout(() => {
            lcdText.style.display = 'block'; lcdText.innerHTML = "PARTY LOADED!";
            meme.style.display = 'block'; links.style.display = 'flex';
        }, 600);
    }
</script>
</body>
</html>
