<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MAISON DE BOIS - 2008-2018 EXPERIENCE</title>
    <style>

        @keyframes itemGlow {
    0% { filter: drop-shadow(0 0 5px var(--cyan)); transform: scale(1); }
    50% { filter: drop-shadow(0 0 15px var(--yellow)); transform: scale(1.1); }
    100% { filter: drop-shadow(0 0 5px var(--cyan)); transform: scale(1); }
}

.swag-item {
    /* ... tes propriétés actuelles ... */
    animation: itemGlow 1.5s infinite ease-in-out;
}
.trash-item {
    position: absolute;
    width: 100px; /* Plus gros */
    height: 120px; 
    background-size: contain;
    background-repeat: no-repeat;
    background-position: bottom center;
    z-index: 20;
    /* Ombre noire pour le détacher du fond sans faire "bonus" */
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.7)); 
    /* Animation de marche légère pour le flic si tu veux */
    transition: transform 0.1s;
}

/* Style spécifique pour la Puff qui est souvent plus petite en réalité */
.trash-item[style*="Puff"] {
    width: 60px;
    height: 80px;
}

.trash-popup {
    position: absolute;
    color: #ff0000; /* Rouge pour le côté "pas bien" */
    font-family: 'Retro', sans-serif;
    font-size: 1rem;
    font-weight: bold;
    text-shadow: 1px 1px 0px #fff;
    pointer-events: none;
    z-index: 100;
    animation: floatUp 0.8s ease-out forwards;
}

/* Style pour les messages flottants */
.swag-popup {
    position: absolute;
    color: var(--yellow);
    font-family: 'Retro', sans-serif;
    font-size: 1.2rem;
    font-style: italic;
    text-shadow: 2px 2px 0px var(--pink);
    pointer-events: none;
    z-index: 100;
    animation: floatUp 0.8s ease-out forwards;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
}



        @font-face {
            font-family: 'Retro';
            src: local('Impact'), local('Arial Black');
        }

        :root {
            --pink: #ff00ff;
            --green: #00ff00;
            --purple: #8a2be2;
            --cyan: #00ffff;
            --yellow: #ffff00;
        }

        body {
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; overflow: hidden;
            background: linear-gradient(45deg, #000, #1a0033, #001a1a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            user-select: none; -webkit-tap-highlight-color: transparent;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none; z-index: 50;
        }

        .shape {
            position: absolute; z-index: -1; opacity: 0.5;
            animation: float 20s infinite alternate ease-in-out;
        }
        .shape-glitch { animation: float 15s infinite alternate-reverse, glitchPulse 3s infinite; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(150px, -100px) rotate(360deg) scale(1.2); }
        }
        @keyframes glitchPulse {
            0%, 100% { filter: drop-shadow(0 0 5px var(--cyan)); }
            50% { filter: drop-shadow(0 0 15px var(--pink)); }
        }

        #main-container {
            text-align: center; border: 2px solid var(--cyan); padding: 25px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 20px; box-shadow: 0 0 40px rgba(255, 0, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.1);
            max-width: 600px; width: 90%; position: relative; z-index: 10;
        }

        h1 {
            font-family: 'Retro', sans-serif; font-size: 2.2rem; margin-top: 0; margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff 0%, var(--pink) 50%, var(--purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(2px 2px 0px var(--cyan)); font-style: italic;
        }

        .status-screen {
            background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
            border: 3px solid var(--pink); border-radius: 10px; 
            height: 160px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            margin: 20px 0; position: relative; box-shadow: inset 0 0 20px #000;
            overflow: hidden;
            transition: height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .lcd-text { color: var(--cyan); font-weight: bold; font-size: 0.9rem; text-shadow: 0 0 5px var(--cyan); margin-bottom: 15px; }

        .progress-bar-curved {
            width: 80%; height: 15px; background: rgba(255,255,255,0.1);
            border-radius: 50px; overflow: hidden; border: 1px solid var(--cyan);
            box-shadow: 0 0 10px rgba(0,255,255,0.2); display: none;
        }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--green), var(--cyan)); transition: width 0.2s; }

        #game-area { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; background: rgba(0, 255, 255, 0.05); }
        
        #background-layer { 
            position: absolute; top: 0; left: 0; height: 100%; width: 600%; 
            display: flex; will-change: transform; pointer-events: none; z-index: 1;
        }
        .bg-slice { 
    width: 16.66%; 
    height: 100%; 
    /* On force l'image à s'afficher entièrement dans sa tranche */
    background-size: 100% 100%; 
    background-position: center;
    background-repeat: no-repeat;
}
        .img-1 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD1.jpg?raw=true'); }
        .img-2 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD2.jpg?raw=true'); }
        .img-3 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD3.jpg?raw=true'); }
        .img-4 { background-image: url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/FD4.jpg?raw=true'); }
#player {
    position: absolute;
    bottom: 0;
    left: 30px;
    height: 160px; /* On l'agrandit nettement */
    aspect-ratio: 1 / 1; /* Force un carré parfait pour éviter l'écrasement */
    z-index: 20;
    background-size: contain; 
    background-repeat: no-repeat;
    background-position: center bottom;
    image-rendering: pixelated;
    transition: bottom 0.02s linear;
}
        
        .swag-item {
            position: absolute; width: 40px; height: 40px;
            background-size: contain; background-repeat: no-repeat;
            z-index: 18; pointer-events: none;
        }

        .ground-line {
            position: absolute; bottom: 0; width: 100%; height: 2px;
            background: var(--pink); box-shadow: 0 0 10px var(--pink); z-index: 10;
        }

        .action-btn {
            background: linear-gradient(to bottom, var(--cyan), var(--purple));
            color: white; border: 2px solid #fff; padding: 15px 30px;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; box-shadow: 0 5px 15px rgba(0, 255, 255, 0.4);
            font-family: 'Retro', sans-serif; animation: pulseBtn 2s infinite;
        }
        @keyframes pulseBtn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #links-container { display: none; flex-direction: column; gap: 15px; width: 100%; margin-top: 10px; }
        .link-btn {
            text-decoration: none; padding: 15px; background: var(--green); color: black;
            font-weight: 900; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
            transition: 0.2s; font-family: 'Retro', sans-serif; font-size: 1.1rem; text-transform: uppercase;
        }
        .link-btn:hover { transform: skew(-5deg) scale(1.02); background: var(--yellow); box-shadow: 5px 5px 0px var(--pink); }

        .meme-gif { width: 60px; margin-top: 10px; border-radius: 5px; border: 2px solid white; display: none; z-index: 40; }
        .hint-text { font-size: 0.7rem; color: var(--yellow); margin-top: 10px; display: none; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        @media screen and (max-width: 900px) and (orientation: landscape) {
    #main-container {
        width: 95%;
        padding: 10px;
    }
    .status-screen {
        height: 200px; /* On gagne de la place pour le décor */
    }
    h1 { font-size: 1.5rem; }
}
    </style>
</head>
<body>

<div class="scanlines"></div>

<svg class="shape" style="top:5%; left:5%; width:150px;" viewBox="0 0 200 200"><circle cx="100" cy="100" r="80" stroke="var(--cyan)" stroke-width="3" fill="none" stroke-dasharray="10 5"/></svg>
<svg class="shape shape-glitch" style="bottom:10%; right:5%; width:180px;" viewBox="0 0 200 200"><rect x="50" y="50" width="100" height="100" stroke="var(--green)" stroke-width="2" fill="none" transform="rotate(45 100 100)" /></svg>

<div id="main-container">
    <h1>MAISON DE BOIS</h1>
    <div style="font-weight: bold; color: var(--yellow); font-size: 0.75rem; letter-spacing: 2px;">BIEN PUBLIC • BORDEAUX • 07.05</div>
    
    <div class="status-screen" id="screen" onclick="jump()" ontouchstart="jump()">
        <div id="lcd-text" class="lcd-text">[ SYSTEM STATUS: IDLE ]</div>
        <div id="loading-bar" class="progress-bar-curved"><div id="loading-fill" class="progress-fill"></div></div>
        
        <div id="game-ui" style="display:none; width: 100%; position: absolute; top: 10px; text-align: center; z-index: 30;">
            <div style="font-size: 0.6rem; color: var(--cyan); margin-bottom: 5px;">SWAG LEVEL</div>
            <div class="progress-bar-curved" style="display: inline-block; width: 70%; height: 10px; border-radius: 50px;"><div id="game-fill" class="progress-fill"></div></div>
        </div>

        <div id="game-area">
            <div id="background-layer">
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-3"></div>
                <div class="bg-slice img-1"></div>
                <div class="bg-slice img-2"></div>
                <div class="bg-slice img-4"></div>
            </div>
            <div class="ground-line"></div>
            <div id="player"></div>
        </div>
        <img id="meme" class="meme-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZueXFpZ3R4bmZueXFpZ3R4bmZueXFpZ3R4bmZueXFpJnB0PWFjdGl2ZV9mZWVk/sIIhZmxU2XfTq/giphy.gif">
    </div>

    <div id="hint" class="hint-text">TAP TO COLLECT SWAG!</div>
    <button id="main-btn" class="action-btn" onclick="startSequence()">BOOT SYSTEM</button>

    <div id="links-container">
        <a href="https://dice.fm/event/k6d99l-les-nuits-maison-de-bois-7th-may-bien-public-bordeaux-tickets" class="link-btn" target="_blank">🎟️ BILLETTERIE DICE</a>
        <a href="https://www.instagram.com/p/DXuQVvaDCUo/" class="link-btn" style="background: var(--pink); color: white;" target="_blank">📸 INSTAGRAM POST</a>
    </div>
</div>

<script>


const trashPhrases = ["C'EST NUL !", "PAS SWAG...", "LA HONTE !", "ZÉRO STYLE", "CHEUM", "AÏE AÏE AÏE"];
    const screen = document.getElementById('screen');
    const btn = document.getElementById('main-btn');
    const lcdText = document.getElementById('lcd-text');
    const loadBar = document.getElementById('loading-bar');
    const loadFill = document.getElementById('loading-fill');
    const gameArea = document.getElementById('game-area');
    const bgLayer = document.getElementById('background-layer');
    const gameUI = document.getElementById('game-ui');
    const gameFill = document.getElementById('game-fill');
    const player = document.getElementById('player');
    const hint = document.getElementById('hint');
    const links = document.getElementById('links-container');
    const meme = document.getElementById('meme');

   const spriteWalk = [
    "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Marche1.png?raw=true')",
    "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Marche%202.png?raw=true')",
    "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Marche%203.png?raw=true')",
    "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Marche%204.png?raw=true')"
];
    const spriteJump = ["url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Saut%201%20(2).png?raw=true')"];
    const spriteDance = ["url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Dance%201%20(3).png?raw=true')", "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Danse%202(3).png?raw=true')", "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Danse%203%20(3).png?raw=true')"];
    const spriteAction = ["url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Action%201%20(4).png?raw=true')"];

    // CONFIGURATION DES OBJETS (Assignation spécifique)
    // x: Position sur le fond (0 à 6000 env), y: hauteur depuis le sol
    const swagObjectsConfig = [
        { id: 'obj1', x: 800, y: 40, img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/WATIB.png?raw=true')" },
        { id: 'obj2', x: 1500, y: 120, img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/PETSHOP.png?raw=true')" },
        { id: 'obj3', x: 2200, y: 60, img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/LUNETTE%20SWAG.png?raw=true')" },
        { id: 'obj4', x: 3500, y: 100, img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/IPOD.png?raw=true')" },
        { id: 'obj5', x: 4800, y: 40, img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/HANDSPINNER.png?raw=true')" }
    ];

    const swagPhrases = ["TROP DE STYLE !", "SWAG DE POULE !", "FRAIS !", "OKLM", "GÉNÉRATION 2008", "STEEZY", "PROPRE !"];
    const trashObjectsConfig = [
    { id: 'police1', x: 1200, y: 0, type: 'police', imgs: ["url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/flic%201%20(2).png?raw=true')", "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/flic%202%20(2).png?raw=true')"] },
    { id: 'poubelle', x: 2800, y: 0, type: 'static', img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Poubelle.png?raw=true')" },
    { id: 'puff', x: 4000, y: 80, type: 'static', img: "url('https://github.com/S0Kush/maison-de-bois-2026/blob/main/Puff%20JNR.png?raw=true')" }
];

const allObjectsConfig = [...swagObjectsConfig, ...trashObjectsConfig];
    let gameActive = false, swagScore = 0, gameInterval, animFrame = 0, isDancing = false;
    let playerY = 0, vy = 0, gravity = 0.28, isJumping = false;
    let activeItems = [], collectedIds = new Set();
    let lastTime = 0;
const fpsTarget = 60; // On cible la vitesse normale
const frameMs = 1000 / fpsTarget;

    function startSequence() {
        btn.style.display = 'none';
        loadBar.style.display = 'block';
        let width = 0;
        const loadInterval = setInterval(() => {
            if (width >= 100) {
                clearInterval(loadInterval);
                lcdText.style.display = 'none'; loadBar.style.display = 'none';
                screen.style.height = '320px';
                setTimeout(startGame, 600);
            } else {
                width += 5; loadFill.style.width = width + '%';
                lcdText.innerHTML = "LOADING SWAG...";
            }
        }, 100);
    }

   function startGame() {
    gameArea.style.display = 'block'; 
    gameUI.style.display = 'block'; 
    hint.style.display = 'block';
    gameActive = true; 
    lastTime = performance.now(); // Initialise le chrono
    requestAnimationFrame(smoothLoop);
}
    function jump() { 
        if (!gameActive || isJumping || isDancing) return; 
        isJumping = true; 
        vy = 8; 
    }

function manageItems() {
    const bgOffset = swagScore * 30;

    allObjectsConfig.forEach(obj => {
        const currentX = obj.x - bgOffset;
        
        // --- DISPARITION DIRECTE APRÈS LA BORDURE ---
        // On vérifie si l'objet a dépassé le bord gauche (0)
        if (currentX < -100) { // On garde une petite marge de -100 pour que l'image sorte entièrement
            let itemIndex = activeItems.findIndex(i => i.id === obj.id);
            if (itemIndex !== -1) {
                activeItems[itemIndex].el.remove(); 
                activeItems.splice(itemIndex, 1);   
                collectedIds.add(obj.id); 
            }
            return; // ON S'ARRÊTE LÀ pour cet objet, on ne passe pas à la suite
        }

        // --- AFFICHAGE ET LOGIQUE SI VISIBLE ---
        if (currentX < screen.offsetWidth + 50 && currentX >= -100 && !collectedIds.has(obj.id)) {
            let item = activeItems.find(i => i.id === obj.id);
            const isTrash = (obj.type === 'police' || obj.id === 'poubelle' || obj.id === 'puff');

            if (!item) {
                const el = document.createElement('div');
                el.className = isTrash ? 'trash-item' : 'swag-item';
                
                if (isTrash) {
                    el.style.width = "100px";
                    el.style.height = "120px";
                    el.style.filter = "drop-shadow(0 0 5px red)";
                    el.style.zIndex = "25";
                }

                if (obj.img) el.style.backgroundImage = obj.img;
                gameArea.appendChild(el);
                item = { el, id: obj.id, x: obj.x, y: obj.y, type: obj.type };
                activeItems.push(item);
            }
            
            // Animation et Position
            if (obj.type === 'police' && obj.imgs) {
                let frameIndex = Math.floor(animFrame / 15) % 2;
                item.el.style.backgroundImage = obj.imgs[frameIndex];
            }

            let finalY = (obj.type === 'police' || obj.id === 'poubelle') ? 0 : obj.y;
            const isFlying = (!obj.type || (obj.type === 'static' && obj.id !== 'poubelle'));
            const bounce = isFlying ? Math.sin(animFrame * 0.1) * 10 : 0;
            
            item.el.style.left = currentX + 'px';
            item.el.style.bottom = (finalY + bounce) + 'px';

            // Collisions
            const hitHeight = isTrash ? 50 : 60;
            if (currentX < 60 && currentX > 20 && Math.abs(playerY - finalY) < hitHeight) {
                if (isTrash) collectTrash(item);
                else collectItem(item);
            }
        }
    });
}

    function collectItem(item) {
    collectedIds.add(item.id);
    
    // Création du message flottant
    const popup = document.createElement('div');
    popup.className = 'swag-popup';
    popup.style.left = item.el.style.left;
    popup.style.bottom = (parseInt(item.el.style.bottom) + 40) + 'px';
    popup.innerHTML = swagPhrases[Math.floor(Math.random() * swagPhrases.length)];
    gameArea.appendChild(popup);
    
    // Nettoyage automatique du message
    setTimeout(() => popup.remove(), 800);

    item.el.remove();
    activeItems = activeItems.filter(i => i.id !== item.id);
    
    // Ton effet visuel sur la barre
    gameFill.style.filter = "brightness(2)";
    setTimeout(() => gameFill.style.filter = "none", 200);
}

function collectTrash(item) {
    collectedIds.add(item.id);
    
    // Message de honte
    const popup = document.createElement('div');
    popup.className = 'trash-popup';
    popup.style.left = item.el.style.left;
    popup.style.bottom = (parseInt(item.el.style.bottom) + 60) + 'px';
    popup.innerText = trashPhrases[Math.floor(Math.random() * trashPhrases.length)];
    gameArea.appendChild(popup);
    
    setTimeout(() => popup.remove(), 800);
    item.el.remove();
    
    // Optionnel : Baisser un peu la barre de swag
    swagScore = Math.max(0, swagScore - 5); 
    gameFill.style.width = swagScore + '%';
    
    // Effet visuel de flash rouge sur l'écran
    screen.style.borderColor = "red";
    setTimeout(() => screen.style.borderColor = "var(--pink)", 200);
}
    function gameLoop() {
        if (!gameActive) return;
        
        // Physique
        vy -= gravity; playerY += vy;
        if (playerY <= 0) { playerY = 0; vy = 0; isJumping = false; }
        player.style.bottom = playerY + 'px';
        animFrame++;

        if (!isDancing) {
            swagScore += 0.08;
            gameFill.style.width = swagScore + '%';
            bgLayer.style.transform = `translateX(-${swagScore * 0.833}%)`;
            
            manageItems(); // Gestion des objets Swag

            if (swagScore >= 100) startDance();
            
            // Animation perso
           if (isJumping) {
    player.style.backgroundImage = spriteJump[0];
} else {
    // Alterne entre les 4 frames de marche toutes les 10 frames de jeu
    let walkFrame = Math.floor(animFrame / 10) % 4;
    player.style.backgroundImage = spriteWalk[walkFrame];
}
        } else {
            player.style.backgroundImage = spriteDance[Math.floor(animFrame/10)%3];
        }
    }

    function startDance() {
        isDancing = true; 
        activeItems.forEach(i => i.el.remove());
        player.style.left = "calc(50% - 32px)"; playerY = 0;
        setTimeout(endSequence, 4000);
    }

    function endSequence() {
        gameActive = false; clearInterval(gameInterval);
        gameArea.style.display = 'none'; gameUI.style.display = 'none'; hint.style.display = 'none';
        screen.style.height = '160px';
        setTimeout(() => {
            lcdText.style.display = 'block'; lcdText.innerHTML = "PARTY LOADED!";
            meme.style.display = 'block'; links.style.display = 'flex';
        }, 600);
    }
   function smoothLoop(currentTime) {
    if (!gameActive) return;

    // Calcul du temps écoulé depuis la dernière image
    const deltaTime = currentTime - lastTime;

    // On ne lance gameLoop que si assez de temps est passé (env 16ms)
    if (deltaTime >= frameMs) {
        gameLoop();
        lastTime = currentTime;
    }

    requestAnimationFrame(smoothLoop);
}
function handleJump() {
    if (isJumping) {
        playerY += verticalVelocity;
        verticalVelocity += gravity; // La gravité tire Béné vers le bas

        if (playerY <= 0) {
            playerY = 0;
            isJumping = false;
            verticalVelocity = 0;
        }
    }
}
</script>
</body>
</html>
